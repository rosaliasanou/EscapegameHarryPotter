<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Escape Game Harry Potter </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
  <h1>Quiz : Quelle est ta maison?</h1>

  <form id="quizForm">

      <div class="question">
            <p>1. Quelle qualité te décrit le mieux?</p>
            <label><input type="radio" name="q1" value="Gryffondor"> Courage</label>
            <label><input type="radio" name="q1" value="Serdaigle"> Intelligence</label>
            <label><input type="radio" name="q1" value="Poufsouffle"> Loyauté</label>
            <label><input type="radio" name="q1" value="Serpentard"> Ambition</label>
        </div>

      <div class="question">
            <p>2. Quel animal préfères-tu?</p>
            <label><input type="radio" name="q2" value="Gryffondor"> Lion</label>
            <label><input type="radio" name="q2" value="Serdaigle"> Aigle</label>
            <label><input type="radio" name="q2" value="Poufsouffle"> Blaireau</label>
            <label><input type="radio" name="q2" value="Serpentard"> Serpent</label>
        </div>

      <div class="question">
            <p>3. Que ferais-tu face à un défi?</p>
            <label><input type="radio" name="q3" value="Gryffondor"> Je fonce sans hésiter</label>
            <label><input type="radio" name="q3" value="Serdaigle"> J’analyse avant d’agir</label>
            <label><input type="radio" name="q3" value="Poufsouffle"> Je demande de l’aide à mes amis</label>
            <label><input type="radio" name="q3" value="Serpentard"> Je trouve un moyen stratégique de gagner</label>
        </div>

      <div class="question">
            <p>4. Quelle couleur préfères-tu?</p>
            <label><input type="radio" name="q4" value="Gryffondor"> Rouge</label>
            <label><input type="radio" name="q4" value="Serdaigle"> Bleu</label>
            <label><input type="radio" name="q4" value="Poufsouffle"> Jaune</label>
            <label><input type="radio" name="q4" value="Serpentard"> Vert</label>
        </div>

      <div class="question">
            <p>5. Quelle matière à Poulard préférez-vous?</p>
            <label><input type="radio" name="q5" value="Gryffondor"> Défense contre les Forces du Mal</label>
            <label><input type="radio" name="q5" value="Serdaigle"> Astronomie</label>
            <label><input type="radio" name="q5" value="Poufsouffle"> Soins aux créatures magiques</label>
            <label><input type="radio" name="q5" value="Serpentard"> Sortilèges</label>
        </div>

    <button type="button" id="Boutton">Voir mon résultat</button>

  </form>

  <div class="result" id="resultat"></div>
</div>

<script src="script.js"></script>
</body>
</html>
